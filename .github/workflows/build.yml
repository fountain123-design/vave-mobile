name: Build VAVE Mobile APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev \
            libc6-dev libffi-dev libssl-dev libsqlite3-dev wget curl llvm libltdl-dev
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> "$GITHUB_ENV"

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK (debug)
        env:
          GRADLE_OPTS: "-Xmx2g -XX:MaxMetaspaceSize=512m"
        run: |
          set -eo pipefail
          buildozer -v android debug 2>&1 | tee buildozer.log || {
            # Fix: buildozer's target venv ships pip 26.x whose bundled
            # resolvelib removed `RequirementInformation`, which p4a imports.
            # Downgrade pip in the venv(s) to 22.2.2 (resolvelib 0.8.1 keeps it).
            for i in 1 2 3; do
              echo "::warning::Build failed (attempt $i). Downgrading pip in venv(s)..."
              for V in $(find .buildozer -name venv -type d 2>/dev/null); do
                echo "  downgrading pip in $V"
                "$V/bin/python" -m pip install "pip==22.2.2" 2>&1 | tail -2 || true
              done
              if buildozer -v android debug 2>&1 | tee buildozer.log; then
                echo "BUILD SUCCEEDED on retry $i"
                break
              fi
            done
          }

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: vave-mobile-apk
          path: bin/*.apk
          if-no-files-found: error

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: buildozer.log
